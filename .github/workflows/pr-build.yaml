name: PR Build & Test

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

  cypress:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Run Cypress Tests
        uses: cypress-io/github-action@v6
        with:
          start: npm run start:cy
          wait-on: 'http://localhost:3000/'
          wait-on-timeout: 120

      - name: Upload Cypress coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: coverage/coverage-final.json

  unit-tests:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run Tests
        run: npm run test -- --coverage

      - name: Upload unit test coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit/coverage-final.json

  upload-cypress-coverage:
    runs-on: ubuntu-latest
    needs: cypress

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Cypress coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-e2e
          path: ./cypress-coverage

      - name: Upload Cypress coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cypress-coverage/coverage-final.json